# fly launch created app `daily-standup-api-small-ocean-5533` → https://daily-standup-api-small-ocean-5533.fly.dev
# Optional rename later: fly apps rename -a daily-standup-api-small-ocean-5533 <new-name>

app = "daily-standup-api-small-ocean-5533"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  # SQLite fallback only: ignored when Fly secret DATABASE_URL is set (Supabase/Postgres).
  DATA_DIR = "/app/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
