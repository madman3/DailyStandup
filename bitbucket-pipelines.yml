# Bitbucket → Railway (backend/)
#
# Repository variables (Bitbucket → Settings → Repository variables):
#   RAILWAY_TOKEN          — required, secured (Railway project token)
#   RAILWAY_PROJECT_ID     — project UUID from Railway project settings
#   RAILWAY_SERVICE        — service name OR service UUID from Railway (required if PROJECT_ID is set)
#   RAILWAY_ENVIRONMENT    — optional, default production (must match env name in Railway)
#
# If you set RAILWAY_PROJECT_ID, you must also set RAILWAY_SERVICE — the CLI needs -s with -p.
# npm deprecation warnings from @railway/cli deps are safe to ignore.
#
# Uses npx so Railway CLI works in CI without global PATH issues.

image: node:20

definitions:
  steps:
    - step: &deploy-backend-railway
        name: Deploy backend to Railway
        deployment: production
        script:
          - |
            set -e
            ENV="${RAILWAY_ENVIRONMENT:-production}"
            if [ -n "$RAILWAY_PROJECT_ID" ]; then
              if [ -z "$RAILWAY_SERVICE" ]; then
                echo "ERROR: RAILWAY_SERVICE is required when RAILWAY_PROJECT_ID is set."
                echo "In Railway: open your project → click the service → Settings → copy Service ID or use the exact service name from the canvas."
                exit 1
              fi
              npx --yes @railway/cli@latest up ./backend --ci -p "$RAILWAY_PROJECT_ID" -e "$ENV" -s "$RAILWAY_SERVICE"
            else
              npx --yes @railway/cli@latest up ./backend --ci
            fi

pipelines:
  branches:
    master:
      - step: *deploy-backend-railway
