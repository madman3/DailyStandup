# Bitbucket Pipelines — CI only (install + file check).
#
# Railway deploys from GitHub (repo: madman3/DailyStandup), root directory: backend.
# Do not add Railway CLI here; it caused repeated "Service not found" from Bitbucket.
# Sync Bitbucket → GitHub, then Railway rebuilds from GitHub.

clone:
  depth: full

image: node:20

pipelines:
  branches:
    master:
      - step:
          name: Monorepo install check
          script:
            - npm ci
            - test -f backend/package.json
            - test -f backend/src/index.js
