# Bitbucket → Railway (backend/)
#
# Variables (Repository settings → Repository variables):
#   RAILWAY_TOKEN        — required, secured (Railway project token)
#   RAILWAY_SERVICE      — Service UUID (Service → Settings → Service ID)
#   RAILWAY_ENVIRONMENT  — optional; default production
#
# Monorepo: use --path-as-root so ./backend archives correctly (fixes "prefix not found").
# Never use ENV="${RAILWAY_ENVIRONMENT:-$RAILWAY_ENVIRONMENT}" — that leaves ENV empty.

image: node:20

definitions:
  steps:
    - step: &deploy-backend-railway
        name: Deploy backend to Railway
        deployment: production
        script:
          - |
            set -e
            ENV="${RAILWAY_ENVIRONMENT:-production}"
            if [ -z "$ENV" ]; then ENV=production; fi
            echo "Deploying with environment: $ENV"

            UP='npx --yes @railway/cli@latest up ./backend --path-as-root --ci'

            if [ -n "$RAILWAY_PROJECT_ID" ] && [ -n "$RAILWAY_SERVICE" ]; then
              $UP -p "$RAILWAY_PROJECT_ID" -e "$ENV" -s "$RAILWAY_SERVICE"
            elif [ -n "$RAILWAY_SERVICE" ]; then
              $UP -e "$ENV" -s "$RAILWAY_SERVICE"
            else
              $UP
            fi

pipelines:
  branches:
    master:
      - step: *deploy-backend-railway
